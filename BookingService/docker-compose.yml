version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: booking-service-mysql-container
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: bookingservicedb
      MYSQL_USER: user
      MYSQL_PASSWORD: user123

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: booking-service-redis-container
    restart: unless-stopped
    ports:
      - "6379:6379"


volumes:
  mysql_data: